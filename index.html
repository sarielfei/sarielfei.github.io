<style>
:root {
  --bg: #faf8f5;
  --surface: #f3f0eb;
  --surface-hover: #ede8e0;
  --text: #1a1815;
  --text-muted: #6b6560;
  --accent: #6b8f5e;
  --accent-hover: #5a7a4e;
  --accent-dim: #e8efe4;
  --rule: #dbd6cf;
  --warm: #e07b5a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: clamp(16px, 1.6vw, 18px);
  scroll-behavior: smooth;
}

body {
  font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* Header */
header {
  padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 6vw, 4rem) clamp(2rem, 5vw, 3rem);
  border-bottom: 1px solid var(--rule);
}

h1 {
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--text);
  max-width: 20ch;
}

h1 span {
  display: block;
  color: var(--accent);
  font-size: 0.55em;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 0.3em;
}

.subtitle {
  font-size: clamp(0.95rem, 1.8vw, 1.15rem);
  color: var(--text-muted);
  font-weight: 300;
  margin-top: 1rem;
  max-width: 36ch;
  letter-spacing: 0.01em;
}

/* Main grid */
.resources {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1px;
  background: var(--rule);
  margin: 0 clamp(1.5rem, 6vw, 4rem);
}

@media (max-width: 768px) {
  .resources {
    grid-template-columns: 1fr;
  }
}

.resource-card {
  background: var(--bg);
  padding: clamp(2rem, 5vw, 3rem);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 2rem;
  transition: background 0.25s ease;
  cursor: default;
  position: relative;
  overflow: hidden;
}

.resource-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 3px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
}

.resource-card:hover { background: var(--surface); }
.resource-card:hover::before { transform: scaleX(1); }

.card-icon {
  font-family: 'DM Mono', monospace;
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 1rem;
}

.card-title {
  font-size: clamp(1.25rem, 2.5vw, 1.65rem);
  font-weight: 700;
  letter-spacing: -0.015em;
  line-height: 1.25;
  color: var(--text);
}

.card-desc {
  font-size: 0.9rem;
  color: var(--text-muted);
  font-weight: 300;
  margin-top: 0.6rem;
  line-height: 1.55;
}

.card-meta {
  display: flex;
  gap: 1.5rem;
  margin-top: 1rem;
  font-size: 0.8rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.card-meta-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.card-meta-item::before {
  content: '';
  display: inline-block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  padding: 0.75rem 1.8rem;
  font-family: 'Noto Sans SC', sans-serif;
  font-size: 0.9rem;
  font-weight: 500;
  letter-spacing: 0.02em;
  color: var(--bg);
  background: var(--accent);
  border: none;
  cursor: pointer;
  text-decoration: none;
  transition: all 0.2s ease;
  align-self: flex-start;
  border-radius: 2px;
}

.btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(107, 143, 94, 0.25);
}

.btn:active {
  transform: translateY(0);
  box-shadow: none;
}

.btn::after {
  content: '&#8594;';
  transition: transform 0.2s ease;
}

.btn:hover::after {
  transform: translateX(3px);
}

/* Footer */
footer {
  padding: clamp(2rem, 5vw, 3.5rem) clamp(1.5rem, 6vw, 4rem);
  border-top: 1px solid var(--rule);
  margin-top: clamp(2rem, 5vw, 4rem);
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  align-items: center;
  gap: 1.5rem;
}

.footer-left {
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.footer-tagline {
  font-size: 0.9rem;
  font-weight: 500;
  color: var(--text);
}

.footer-update {
  font-size: 0.78rem;
  color: var(--text-muted);
  font-family: 'DM Mono', monospace;
}

.footer-right {
  font-size: 0.8rem;
  color: var(--text-muted);
  text-align: right;
}

.footer-right a {
  color: var(--accent);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-right a:hover {
  color: var(--accent-hover);
}

/* Badge */
.badge {
  display: inline-block;
  font-size: 0.7rem;
  font-weight: 500;
  padding: 0.2em 0.6em;
  border-radius: 2px;
  background: var(--accent-dim);
  color: var(--accent);
  letter-spacing: 0.03em;
  margin-left: 0.5rem;
  vertical-align: middle;
}

/* Divider section */
.section-head {
  padding: clamp(1.5rem, 3vw, 2.5rem) clamp(1.5rem, 6vw, 4rem);
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--text-muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-family: 'DM Mono', monospace;
}

/* Pulse dot */
.pulse {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--warm);
  margin-right: 0.4rem;
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.5; transform: scale(1.3); }
}

@media (prefers-reduced-motion: reduce) {
  .pulse { animation: none; }
  .resource-card, .btn, .btn::after { transition: none; }
}
</style>
